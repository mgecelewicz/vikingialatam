    <!-- ESTILOS ESTRUCTURALES DEL CORE (MANTENER EN MAIN CSS) -->

    <style id="living-energy-module">

<body class="text-white selection:bg-viking-gold selection:text-black font-sans">

    <div id="loader" class="fixed inset-0 z-[100] flex flex-col items-center justify-center bg-black transition-opacity duration-1000 ease-in-out">

                Renderizando Motor... 0%
            </div>
        </div>
    </div>

    <!-- NAVEGACIÓN (Z-50) -->
    <header id="main-nav" class="fixed top-0 left-0 w-full z-50 px-8 py-6 flex justify-between items-center opacity-0 pointer-events-none transition-opacity duration-500">
        <div class="text-viking-champagne">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M12 2v20M4 6l8-4 8 4M4 12l8-4 8 4"/></svg>
        </div>
        <nav class="hidden md:flex space-x-12 text-[10px] tracking-[0.3em] text-gray-400 uppercase font-medium pointer-events-auto">
            <a href="#" class="text-viking-gold border-b border-viking-gold pb-1">Inicio</a>
            <a href="#portfolio" class="hover:text-viking-gold transition-colors">Portfolio</a>
            <a href="#" class="hover:text-viking-gold transition-colors">Servicios</a>
            <a href="#" class="hover:text-viking-gold transition-colors">Sobre Mí</a>
            <a href="#" class="hover:text-viking-gold transition-colors">Contacto</a>
        </nav>
        <div class="w-6 hidden md:block"></div>
    </header>

    <div id="scroll-wrapper" class="relative w-full h-[400vh] bg-black">
        <div class="sticky top-0 left-0 w-full h-screen overflow-hidden">
            
            <!-- FASE 1: CANVAS VIDEO (Z-0) -->
            <canvas id="hero-canvas" class="absolute inset-0 w-full h-full object-cover z-0"></canvas>

            <!-- FASE 2: IMAGEN PUENTE HANDOFF (Z-10) -->
            <img id="bridge-image" src="https://raw.githubusercontent.com/mgecelewicz/vikingialatam/main/hero-final-frame.jpeg?v=20260611-3" class="absolute inset-0 w-full h-full object-cover z-10 opacity-0 pointer-events-none" crossorigin="anonymous" />

            <!-- SCROLLDOWN (Z-20) -->
            <div id="scrolldown-indicator" class="absolute bottom-12 left-1/2 -translate-x-1/2 z-20 flex flex-col items-center gap-2 transition-opacity duration-300">
                <svg class="w-5 h-5 text-gray-500 animate-bounce" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M12 4v16m0 0l-4-4m4 4l4-4" stroke-linecap="round" stroke-linejoin="round"/></svg>
                <span class="text-[9px] tracking-[0.4em] uppercase text-gray-500 font-light">Desliza para explorar</span>
            </div>

            <!-- FASE 3: UI CENTRAL (Z-30) -->
            <div id="post-hero-ui" class="absolute inset-0 z-30 flex flex-col items-center justify-center px-4 text-center opacity-0 pointer-events-none transform translate-y-8 transition-transform duration-500">
                <h1 class="text-4xl sm:text-6xl md:text-[5rem] lg:text-[5.5rem] font-bold tracking-[0.25em] uppercase leading-none mb-6 drop-shadow-2xl">
                    <span class="metallic-text">VIKING</span><span class="neon-text-cyan font-extrabold">IA</span><span class="metallic-text">LATAM</span>
                </h1>
                <p class="text-[10px] sm:text-xs md:text-sm tracking-[0.3em] text-gray-300 uppercase max-w-xl leading-relaxed font-light drop-shadow-md">
                    Dirección creativa, contenido visual y motion con IA
                </p>
                <a href="#portfolio" class="relative z-[60] mt-10 px-8 py-3 rounded-md btn-viking-outline text-[10px] tracking-[0.25em] uppercase flex items-center gap-3 text-viking-champagne group font-medium pointer-events-auto">
                    Ver Portfolio
                    <svg class="w-4 h-4 group-hover:translate-x-1 transition-transform duration-300 text-viking-gold" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.8" d="M14 5l7 7m0 0l-7 7m7-7H3"></path></svg>
                </a>
            </div>

            <!-- FASE 3: MOTOR DE ENERGÍA VIVA (Z-40) -->
            <div id="energy-subject-layer" class="absolute inset-y-0 right-0 w-[45%] z-40 pointer-events-none">
                <canvas id="living-energy-canvas" class="absolute inset-0 w-full h-full"></canvas>
                <div id="living-energy-hotspot" class="absolute inset-0"></div>
            </div>

        </div>

    <!-- PREPARACIÓN PERFIL 3/4 -->
    <div id="portfolio" class="relative w-full min-h-screen bg-[#030303] z-40 flex flex-col items-center justify-center border-t border-zinc-900/50">
        <div class="p-8 border border-zinc-800 bg-zinc-950/50 rounded-lg text-center backdrop-blur-sm">
            <span class="block text-viking-gold font-mono text-xs tracking-widest uppercase mb-2">[ CONTENEDOR FASE 4 ]</span>
            <p class="text-zinc-500 font-mono text-[10px] tracking-widest uppercase">TODO: Insertar viking-profile-3-4.png cuando exista.</p>
        </div>
    </div>

    <!-- ======================================================== -->
    <!-- SCRIPT ORIGINAL: MOTOR DEL HERO SCROLL (INTACTO)         -->
    <!-- ======================================================== -->
    <script id="hero-motor-core">
        document.addEventListener("DOMContentLoaded", () => {
            const canvas = document.getElementById("hero-canvas");
            const ctx = canvas.getContext("2d", { alpha: false });
            const bridgeImg = document.getElementById("bridge-image");
            const scrolldown = document.getElementById("scrolldown-indicator");
            const nav = document.getElementById("main-nav");
            const postHeroUI = document.getElementById("post-hero-ui");
            const loader = document.getElementById("loader");
            const loaderText = document.getElementById("loader-text");

            let frames = [];
            let targetScroll = 0, currentScroll = 0;
            let currentFrameIndex = 0;
            let currentPhase = "INIT";
            const heroEnd = 0.75, handoffEnd = 0.85, postHeroStart = 0.85;

            // Evitamos cachear en sessionStorage temporalmente hasta validar performance
            async function extractVideoFrames() {
                return new Promise((resolve) => {
                    const tempVid = document.createElement('video');
                    tempVid.muted = true; tempVid.playsInline = true; tempVid.crossOrigin = 'anonymous';
                    tempVid.src = "https://raw.githubusercontent.com/mgecelewicz/vikingialatam/main/FINAL%20final.mp4?v=20260611-3";

                    tempVid.addEventListener('loadeddata', async () => {
                        const fps = 24; const totalFrames = Math.floor((tempVid.duration || 6) * fps);
                        const scale = Math.min(tempVid.videoHeight, 720) / tempVid.videoHeight;
                        canvas.width = Math.floor(tempVid.videoWidth * scale);
                        canvas.height = Math.floor(tempVid.videoHeight * scale);

                        const offCtx = Object.assign(document.createElement('canvas'), {width: canvas.width, height: canvas.height}).getContext('2d', {alpha: false});

                        for (let i = 0; i < totalFrames; i++) {
                            tempVid.currentTime = i / fps;
                            await new Promise(r => tempVid.addEventListener('seeked', r, {once: true}));
                            offCtx.drawImage(tempVid, 0, 0, canvas.width, canvas.height);
                            try { frames.push(await createImageBitmap(offCtx.canvas)); } 
                            catch(e) { 
                                const c = document.createElement('canvas'); c.width = canvas.width; c.height = canvas.height;
                                c.getContext('2d', {alpha:false}).drawImage(offCtx.canvas, 0, 0); frames.push(c); 
                            }
                            loaderText.innerText = `Renderizando Motor... ${Math.floor((i/totalFrames)*100)}%`;
                        }
                        resolve();
                    });
                    setTimeout(resolve, 8000); // Timeout seguridad
                });
            }

            extractVideoFrames().then(() => {
                loader.classList.add("opacity-0"); setTimeout(() => loader.style.display = "none", 1000);
                if(frames.length > 0) ctx.drawImage(frames[0], 0, 0, canvas.width, canvas.height);
                updateMotor();
            });

            window.addEventListener("scroll", () => {
                const wrapper = document.getElementById("scroll-wrapper");
                targetScroll = Math.max(0, Math.min(1, (window.scrollY - wrapper.offsetTop) / (wrapper.scrollHeight - window.innerHeight)));
            });

            function updateMotor() {
                currentScroll += (targetScroll - currentScroll) * 0.08;
                let targetFrame = 0;

                if (currentScroll <= heroEnd) {
                    if (currentPhase !== "HERO") {
                        currentPhase = "HERO"; document.body.classList.remove('post-hero-active');
                        nav.style.opacity = 0; nav.style.pointerEvents = "none";
                        postHeroUI.style.opacity = 0; postHeroUI.style.transform = `translateY(30px)`; bridgeImg.style.opacity = 0;
                    }
                    targetFrame = Math.floor((currentScroll / heroEnd) * (frames.length - 1));
                    scrolldown.style.opacity = Math.max(0, 1 - (currentScroll / 0.1));
                } else if (currentScroll <= handoffEnd) {
                    if (currentPhase !== "HANDOFF") { currentPhase = "HANDOFF"; document.body.classList.remove('post-hero-active'); scrolldown.style.opacity = 0; }
                    targetFrame = frames.length - 1; bridgeImg.style.opacity = (currentScroll - heroEnd) / (handoffEnd - heroEnd);
                } else {
                    if (currentPhase !== "POST_HERO") { currentPhase = "POST_HERO"; bridgeImg.style.opacity = 1; document.body.classList.add('post-hero-active'); }
                    targetFrame = frames.length - 1;
                    let uiProgress = Math.max(0, Math.min(1, ((currentScroll - postHeroStart) / (1 - postHeroStart)) * 2));
                    nav.style.opacity = uiProgress; nav.style.pointerEvents = uiProgress > 0.5 ? "auto" : "none";
                    postHeroUI.style.opacity = uiProgress; postHeroUI.style.transform = `translateY(${(1 - uiProgress) * 30}px)`;
                }

                currentFrameIndex += (targetFrame - currentFrameIndex) * 0.2;
                let drawIndex = Math.max(0, Math.min(frames.length - 1, Math.floor(currentFrameIndex)));
                if (frames.length > 0) ctx.drawImage(frames[drawIndex], 0, 0, canvas.width, canvas.height);
                
                requestAnimationFrame(updateMotor);
            }
        });
    </script>

    <!-- ======================================================== -->
    <!-- EXTRACTO PARA: /js/living-energy.js                        -->
    <!-- ======================================================== -->
    <script id="living-energy-module-js">
        document.addEventListener("DOMContentLoaded", () => {
            const DEBUG_ENERGY = false; // <-- Cambiar a true para ver Nodos y Puntos
            
            const eCanvas = document.getElementById("living-energy-canvas");
            if (!eCanvas) return; // Salvaguarda
            
            const eCtx = eCanvas.getContext("2d");
            const eHotspot = document.getElementById("living-energy-hotspot");

            // Coordenadas normalizadas exactas calibradas
            const ENERGY_NODES = [
                { id: 'frente',  nx: 0.45, ny: 0.15, radius: 0.10, energy: 0 },
                { id: 'ojo_izq', nx: 0.38, ny: 0.22, radius: 0.08, energy: 0 },
                { id: 'ojo_der', nx: 0.52, ny: 0.22, radius: 0.08, energy: 0 },
                { id: 'barba',   nx: 0.45, ny: 0.38, radius: 0.15, energy: 0 },
                { id: 'pecho',   nx: 0.45, ny: 0.60, radius: 0.20, energy: 0 },
                { id: 'hom_izq', nx: 0.15, ny: 0.55, radius: 0.18, energy: 0 },
                { id: 'hom_der', nx: 0.75, ny: 0.55, radius: 0.18, energy: 0 },
                { id: 'tor_izq', nx: 0.25, ny: 0.85, radius: 0.18, energy: 0 },
                { id: 'tor_der', nx: 0.65, ny: 0.85, radius: 0.18, energy: 0 }
            ];

            const EYES_CENTER = {
                left:  { nx: 0.38, ny: 0.22 },
                right: { nx: 0.52, ny: 0.22 }
            };

            const ENERGY_LINKS = [
                ['ojo_izq', 'frente'], ['ojo_der', 'frente'],
                ['ojo_izq', 'barba'],  ['ojo_der', 'barba'],
                ['frente', 'pecho'],   ['barba', 'pecho'],
                ['pecho', 'hom_izq'],  ['pecho', 'hom_der'],
                ['pecho', 'tor_izq'],  ['pecho', 'tor_der'],
                ['hom_izq', 'tor_izq'],['hom_der', 'tor_der']
            ];

            let eW = 0, eH = 0;
            let mouseX = -1000, mouseY = -1000;
            let time = 0;
            let animationFrameId = null;

            function resizeLivingCanvas() {
                const rect = eHotspot.getBoundingClientRect();
                eCanvas.width = rect.width;
                eCanvas.height = rect.height;
                eW = rect.width;
                eH = rect.height;
            }
            window.addEventListener('resize', resizeLivingCanvas);
            resizeLivingCanvas();

            eHotspot.addEventListener('mousemove', (e) => {
                const rect = eHotspot.getBoundingClientRect();
                mouseX = e.clientX - rect.left;
                mouseY = e.clientY - rect.top;
            });
            eHotspot.addEventListener('mouseleave', () => {
                mouseX = -1000; mouseY = -1000;
            });

            function renderLivingEnergy() {
                time += 0.02;
                eCtx.clearRect(0, 0, eW, eH);

                // Integración con el DOM central: Pausar tracking si no estamos en fase post-hero
                if (!document.body.classList.contains('post-hero-active')) {
                    mouseX = -1000; mouseY = -1000;
                }

                eCtx.globalCompositeOperation = 'lighter'; 
                let maxEyeEnergy = 0;

                // 1. ACTUALIZAR ENERGÍA DE NODOS
                ENERGY_NODES.forEach(node => {
                    let nxPos = node.nx * eW;
                    let nyPos = node.ny * eH;
                    
                    let waveX = Math.sin(time + node.nx * 10) * 5;
                    let waveY = Math.cos(time + node.ny * 10) * 5;
                    node.currentX = nxPos + waveX;
                    node.currentY = nyPos + waveY;

                    let dist = Math.hypot(mouseX - nxPos, mouseY - nyPos);
                    let triggerRadius = node.radius * eW;
                    
                    let targetEnergy = (dist < triggerRadius) ? 1.0 : 0.0;
                    node.energy += (targetEnergy - node.energy) * 0.08; 

                    if (node.id === 'ojo_izq' || node.id === 'ojo_der') {
                        if (node.energy > maxEyeEnergy) maxEyeEnergy = node.energy;
                    }
                });

                // 2. DIBUJAR NERVIOS CURVOS
                ENERGY_LINKS.forEach(link => {
                    let n1 = ENERGY_NODES.find(n => n.id === link[0]);
                    let n2 = ENERGY_NODES.find(n => n.id === link[1]);
                    
                    if (!n1 || !n2) return;
                    let avgEnergy = (n1.energy + n2.energy) / 2;
                    
                    if (avgEnergy > 0.01) {
                        let midX = (n1.currentX + n2.currentX) / 2;
                        let midY = (n1.currentY + n2.currentY) / 2;
                        let dx = n2.currentX - n1.currentX;
                        let dy = n2.currentY - n1.currentY;
                        
                        let cpX = midX - dy * 0.2;
                        let cpY = midY + dx * 0.2;

                        eCtx.beginPath();
                        eCtx.moveTo(n1.currentX, n1.currentY);
                        eCtx.quadraticCurveTo(cpX, cpY, n2.currentX, n2.currentY);
                        eCtx.strokeStyle = `rgba(255, 180, 50, ${avgEnergy * 0.6})`;
                        eCtx.lineWidth = 1 + (avgEnergy * 3);
                        eCtx.stroke();

                        let flowProgress = (time * 0.5) % 1;
                        let t = flowProgress;
                        let flowX = (1-t)*(1-t)*n1.currentX + 2*(1-t)*t*cpX + t*t*n2.currentX;
                        let flowY = (1-t)*(1-t)*n1.currentY + 2*(1-t)*t*cpY + t*t*n2.currentY;

                        eCtx.beginPath();
                        eCtx.arc(flowX, flowY, 2.5 * avgEnergy, 0, Math.PI * 2);
                        eCtx.fillStyle = `rgba(255, 255, 255, ${avgEnergy})`;
                        eCtx.fill();
                    }
                });

                // 3. DIBUJAR PULSOS DE NODOS SOLARES
                ENERGY_NODES.forEach(node => {
                    if (node.energy > 0.01) {
                        let glowSize = (eW * 0.08) * node.energy + (Math.sin(time*5)*5);
                        let grad = eCtx.createRadialGradient(node.currentX, node.currentY, 0, node.currentX, node.currentY, glowSize);
                        grad.addColorStop(0, `rgba(255, 255, 255, ${node.energy * 0.9})`);
                        grad.addColorStop(0.2, `rgba(255, 150, 0, ${node.energy * 0.6})`);
                        grad.addColorStop(1, `rgba(255, 50, 0, 0)`);
                        
                        eCtx.fillStyle = grad;
                        eCtx.beginPath();
                        eCtx.arc(node.currentX, node.currentY, glowSize, 0, Math.PI*2);
                        eCtx.fill();
                    }
                });

                // 4. DIBUJAR DESTELLO DE OJOS CIAN
                if (maxEyeEnergy > 0.01) {
                    ['left', 'right'].forEach(side => {
                        let ex = EYES_CENTER[side].nx * eW;
                        let ey = EYES_CENTER[side].ny * eH;

                        let eyeGlow = eCtx.createRadialGradient(ex, ey, 0, ex, ey, 60 * maxEyeEnergy);
                        eyeGlow.addColorStop(0, `rgba(0, 255, 255, ${maxEyeEnergy * 0.9})`);
                        eyeGlow.addColorStop(1, `rgba(0, 255, 255, 0)`);
                        eCtx.fillStyle = eyeGlow;
                        eCtx.beginPath(); eCtx.arc(ex, ey, 60 * maxEyeEnergy, 0, Math.PI*2); eCtx.fill();

                        let flareWidth = 150 * maxEyeEnergy;
                        let flareGrad = eCtx.createRadialGradient(ex, ey, 0, ex, ey, flareWidth);
                        flareGrad.addColorStop(0, `rgba(255, 255, 255, ${maxEyeEnergy})`);
                        flareGrad.addColorStop(0.1, `rgba(0, 229, 255, ${maxEyeEnergy})`);
                        flareGrad.addColorStop(1, `rgba(0, 229, 255, 0)`);
                        eCtx.fillStyle = flareGrad;
                        
                        eCtx.beginPath();
                        eCtx.ellipse(ex, ey, flareWidth, 1.5 + (maxEyeEnergy), 0, 0, Math.PI*2);
                        eCtx.fill();
                    });
                }

                if (DEBUG_ENERGY) {
                    eCtx.globalCompositeOperation = 'source-over';
                    eCtx.strokeStyle = 'rgba(255, 255, 255, 0.3)'; eCtx.strokeRect(0,0, eW, eH);
                    eCtx.fillStyle = 'white'; eCtx.font = "12px monospace";
                    eCtx.fillText(`Mouse NX: ${(mouseX/eW).toFixed(2)}, NY: ${(mouseY/eH).toFixed(2)}`, 20, 30);

                    ENERGY_NODES.forEach(n => {
                        eCtx.beginPath(); eCtx.arc(n.nx * eW, n.ny * eH, n.radius * eW, 0, Math.PI*2);
                        eCtx.strokeStyle = 'rgba(255,100,0,0.5)'; eCtx.stroke();
                        eCtx.fillText(n.id, n.nx * eW + 10, n.ny * eH);
                    });

                    ['left', 'right'].forEach(side => {
                        let ex = EYES_CENTER[side].nx * eW, ey = EYES_CENTER[side].ny * eH;
                        eCtx.beginPath(); eCtx.moveTo(ex-10, ey); eCtx.lineTo(ex+10, ey); eCtx.stroke();
                        eCtx.beginPath(); eCtx.moveTo(ex, ey-10); eCtx.lineTo(ex, ey+10); eCtx.stroke();
                    });
                }

                animationFrameId = requestAnimationFrame(renderLivingEnergy);
            }
            
            renderLivingEnergy();
        });
    </script>
