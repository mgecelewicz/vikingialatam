<!DOCTYPE html>
<html lang="es" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VIKINGIA LATAM</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Fuentes: Usamos Montserrat para replicar la tipografía premium y geométrica de la imagen -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;700&display=swap" rel="stylesheet">

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        viking: {
                            gold: '#C5A059',      // Dorado base
                            goldLight: '#E8D099', // Dorado iluminado
                            cyan: '#00E5FF',      // Cian Neón puro
                            dark: '#050505',      // Fondo negro profundo
                        }
                    },
                    fontFamily: {
                        sans: ['Montserrat', 'sans-serif'],
                    },
                    letterSpacing: {
                        'widest-xl': '0.35em',
                        'widest-2xl': '0.5em',
                    }
                }
            }
        }
    </script>

    <style>
        body { background-color: #050505; overflow-x: hidden; color: white; }
        
        /* Scrollbar oscura */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #050505; }
        ::-webkit-scrollbar-thumb { background: #333; }
        
        /* El brillo exacto de la parte "IA" de tu imagen */
        .neon-ia {
            color: #00E5FF;
            font-weight: 700;
            text-shadow: 
                0 0 10px rgba(0, 229, 255, 0.8), 
                0 0 20px rgba(0, 229, 255, 0.5),
                0 0 40px rgba(0, 229, 255, 0.2);
        }

        /* Degradado metálico para "VIKING" y "LATAM" */
        .text-gold-gradient {
            background: linear-gradient(to bottom, #FCEABB, #C5A059);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 300;
        }

        /* Botón calcado de la referencia */
        .btn-portfolio {
            border: 1px solid rgba(197, 160, 89, 0.6);
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(5px);
            transition: all 0.3s ease;
        }
        .btn-portfolio:hover {
            border-color: #E8D099;
            box-shadow: 0 0 15px rgba(197, 160, 89, 0.3);
            background: rgba(197, 160, 89, 0.1);
        }
    </style>
    
    <!-- GSAP & ScrollTrigger -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>
</head>
<body class="font-sans antialiased selection:bg-viking-cyan selection:text-black">

    <!-- Loader Ultra-Rápido: Ahora con timeout para no romper el preview -->
    <div id="loader" class="fixed inset-0 z-50 flex items-center justify-center bg-[#050505] transition-opacity duration-700">
        <div class="text-viking-gold text-xs tracking-widest-xl uppercase animate-pulse">
            Forjando experiencia...
        </div>
    </div>

    <header class="fixed top-0 left-0 w-full z-40 px-8 py-8 flex items-center gap-12 mix-blend-difference pointer-events-none">
        <!-- Logo V -->
        <div class="text-viking-gold pointer-events-auto">
            <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1" stroke-linecap="round" stroke-linejoin="round">
                <path d="M12 2v20M4 4l8 16 8-16"/>
            </svg>
        </div>
        
        <!-- Menú (Igual a la imagen) -->
        <nav class="hidden md:flex space-x-8 text-[9px] tracking-widest-2xl text-gray-400 uppercase font-semibold pointer-events-auto">
            <a href="#" class="text-white border-b border-viking-gold pb-1">Inicio</a>
            <a href="#portfolio" class="hover:text-white transition-colors">Portfolio</a>
            <a href="#" class="hover:text-white transition-colors">Servicios</a>
            <a href="#" class="hover:text-white transition-colors">Sobre Mí</a>
            <a href="#" class="hover:text-white transition-colors">Contacto</a>
        </nav>
    </header>

    <!-- h-[300vh] permite hacer un scroll largo mientras la pantalla se queda fija -->
    <div id="hero-scroll-wrapper" class="relative w-full h-[300vh] bg-black">
        
        <!-- Sticky Viewport -->
        <div class="sticky top-0 left-0 w-full h-screen overflow-hidden flex flex-col justify-center">
            
            <!-- VIDEO BASE (z-0) -->
            <video 
                id="hero-video" 
                class="absolute inset-0 w-full h-full object-cover z-0"
                muted 
                playsinline 
                preload="auto"
                crossorigin="anonymous"
            >
                <source src="https://raw.githubusercontent.com/mgecelewicz/vikingialatam/main/FINAL%20final.mp4" type="video/mp4">
            </video>

            <!-- IMAGEN PUENTE (z-10) - Opacidad 0 al inicio. Se usará como fallback si el video falla en el preview -->
            <img 
                id="bridge-image" 
                src="https://raw.githubusercontent.com/mgecelewicz/vikingialatam/main/hero-final-frame.jpeg" 
                class="absolute inset-0 w-full h-full object-cover z-10 opacity-0 transition-opacity duration-500"
                alt="Vikingia Frame Final" 
                crossorigin="anonymous"
            />

            <!-- OVERLAY (z-20) - Oscurece sutilmente para que el texto resalte -->
            <div class="absolute inset-0 bg-gradient-to-r from-black/60 via-transparent to-black/60 z-20 pointer-events-none"></div>

            <div class="hero-ui-content relative z-30 flex flex-col px-8 md:px-24 w-full">
                
                <!-- Título Principal con IA en Cyan -->
                <h1 class="text-5xl sm:text-7xl md:text-[6rem] lg:text-[7rem] leading-none tracking-widest mb-6">
                    <span class="text-gold-gradient">VIKING</span><span class="neon-ia">IA</span><span class="text-gold-gradient">LATAM</span>
                </h1>
                
                <!-- Bajada -->
                <p class="text-[10px] sm:text-xs md:text-sm tracking-[0.25em] md:tracking-widest-xl text-gray-300 uppercase max-w-2xl mb-12">
                    Dirección creativa,<br class="md:hidden"> contenido visual y motion con IA
                </p>

                <!-- Botón Ver Portfolio -->
                <div>
                    <a href="#portfolio" class="inline-flex items-center gap-6 px-10 py-4 rounded-full btn-portfolio text-[10px] sm:text-xs tracking-widest-xl uppercase text-white group">
                        Ver Portfolio
                        <svg class="w-4 h-4 text-viking-gold group-hover:translate-x-1 transition-transform" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M4 12h16m0 0l-6-6m6 6l-6 6"></path>
                        </svg>
                    </a>
                </div>

                <!-- Indicador de Scroll -->
                <div class="absolute bottom-12 left-8 md:left-24 flex items-center gap-4 text-viking-gold opacity-80">
                    <svg class="w-4 h-4 animate-bounce" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1">
                        <path d="M12 4v16m0 0l-4-4m4 4l4-4" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                    <span class="text-[8px] tracking-widest-2xl uppercase text-gray-400">Desliza para explorar</span>
                </div>
            </div>

        </div>
    </div>

    <div id="portfolio" class="relative z-40 w-full min-h-screen bg-[#050505] text-white py-24 flex items-center justify-center border-t border-white/5">
        <div class="text-center px-4">
            <h2 class="text-xs tracking-widest-xl text-viking-gold uppercase mb-4">Sección 02</h2>
            <p class="text-sm text-gray-500 max-w-md">El scroll superó el Hero y la imagen puente quedó anclada correctamente debajo de esta capa oscura.</p>
        </div>
    </div>

    <script>
        gsap.registerPlugin(ScrollTrigger);

        document.addEventListener("DOMContentLoaded", () => {
            const video = document.getElementById("hero-video");
            const bridgeImg = document.getElementById("bridge-image");
            const loader = document.getElementById("loader");
            
            let isLoaded = false;
            
            // Función de inicio robusta
            const startExperience = () => {
                if (isLoaded) return;
                isLoaded = true;
                
                // Ocultar loader
                loader.classList.add("opacity-0");
                setTimeout(() => loader.style.display = "none", 700);
                
                // Si el video falló o estamos en un iframe estricto (readyState muy bajo)
                // forzamos mostrar la imagen de inmediato para que el preview no sea negro.
                if (video.readyState < 1) {
                    bridgeImg.style.opacity = "1";
                }
                
                initScrollAnimations();
            };

            // Intentamos cargar el video
            video.addEventListener("loadedmetadata", startExperience);
            video.addEventListener("canplaythrough", startExperience);
            
            // TIMEOUT DE SEGURIDAD: 1.5 segundos máximo. 
            // Si el iframe bloquea el video, forzamos el inicio para que veas el diseño.
            setTimeout(startExperience, 1500);

            function initScrollAnimations() {
                // Duración base: si el video carga, usa su duración. Si falla, asume 6 segundos.
                let duration = video.duration && !isNaN(video.duration) ? video.duration : 6;
                let proxy = { time: 0 };

                // Timeline fijado al scroll
                const tl = gsap.timeline({
                    scrollTrigger: {
                        trigger: "#hero-scroll-wrapper",
                        start: "top top",
                        end: "bottom bottom",
                        scrub: 1, // Suavizado
                        pin: true, // Mantiene la pantalla fija mientras escroleas
                    }
                });

                // 1. Ocultar los textos suavemente al empezar a bajar
                tl.to(".hero-ui-content", {
                    y: -50,
                    opacity: 0,
                    duration: duration * 0.3, 
                    ease: "power2.out"
                }, 0);

                // 2. Scrub del video (Si el video está disponible)
                tl.to(proxy, {
                    time: duration - 0.1, // No llegamos al tope exacto para evitar parpadeo
                    duration: duration,
                    ease: "none",
                    onUpdate: () => {
                        if (video.readyState >= 1) {
                            video.currentTime = proxy.time;
                        }
                    }
                }, 0);

                // 3. CONTINUIDAD: Cruce invisible a la imagen puente.
                // Entre el 85% y el 100% del scroll, la imagen de fallback sube su opacidad a 1.
                // El video NUNCA se apaga, queda tapado por la imagen exacta.
                tl.to(bridgeImg, {
                    opacity: 1,
                    duration: duration * 0.15, 
                    ease: "none"
                }, duration * 0.85); 
            }
        });
    </script>
</body>
</html>
