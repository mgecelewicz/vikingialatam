<!DOCTYPE html>
<html lang="es" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VIKINGIA LATAM — Premium Creative Studio</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;700;900&display=swap" rel="stylesheet">

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        viking: { gold: '#D4AF37', champagne: '#E2C799', cyan: '#00E5FF', dark: '#030303' }
                    },
                    fontFamily: { sans: ['Montserrat', 'sans-serif'] }
                }
            }
        }
    </script>

    <style>
        body { background-color: #030303; overflow-x: hidden; margin: 0; }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #030303; }
        ::-webkit-scrollbar-thumb { background: #222; border-radius: 3px; }
        
        .neon-text-cyan {
            color: #00E5FF;
            text-shadow: 0 0 10px rgba(0, 229, 255, 0.8), 0 0 25px rgba(0, 229, 255, 0.4);
        }
        .metallic-text {
            background: linear-gradient(135deg, #FFFFFF 0%, #E2C799 50%, #B89B6C 100%);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }
        .btn-viking-outline {
            border: 1.5px solid rgba(226, 199, 153, 0.35);
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(8px);
            transition: all 0.4s ease;
        }
        .btn-viking-outline:hover {
            border-color: #D4AF37;
            box-shadow: 0 0 20px rgba(212, 175, 55, 0.25);
            transform: translateY(-2px);
        }

        /* EFECTOS HOVER PREMIUM (Fase 3) */
        
        /* Ojos: Lens Flare y Glow Radial */
        .eye-flare-container {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 100%; height: 100%;
            pointer-events: none; opacity: 0; transition: opacity 0.4s ease-out;
            display: flex; align-items: center; justify-content: center;
        }
        .lens-flare-core {
            position: absolute; width: 160px; height: 2px;
            background: #FFFFFF;
            box-shadow: 0 0 10px #00E5FF, 0 0 20px #00E5FF, 0 0 40px #00E5FF;
            border-radius: 50%; transform: scaleX(0);
            transition: transform 0.5s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .eye-glow-radial {
            position: absolute; width: 90px; height: 90px;
            background: radial-gradient(circle, rgba(0,229,255,0.6) 0%, transparent 60%);
            transform: scale(0.8); transition: transform 0.6s ease-out;
        }

        /* Cuerpo: Flujo Interno Energético (Color-Dodge) */
        .energy-flow-overlay {
            position: absolute; top: 15%; right: 5%; w-[45%]; h-[85%];
            pointer-events: none; opacity: 0; transition: opacity 0.6s ease;
            mix-blend-mode: color-dodge; /* Clave para iluminar líneas internas doradas */
            mask-image: radial-gradient(ellipse at center, rgba(0,0,0,1) 30%, transparent 70%);
            -webkit-mask-image: radial-gradient(ellipse at center, rgba(0,0,0,1) 30%, transparent 70%);
            overflow: hidden; border-radius: 40%;
        }
        .energy-gradient-sweeper {
            position: absolute; top: -50%; left: -50%; width: 200%; height: 200%;
            background: conic-gradient(from 0deg, transparent 0deg, rgba(212, 175, 55, 0.15) 60deg, rgba(255, 255, 255, 0.9) 180deg, rgba(212, 175, 55, 0.15) 300deg, transparent 360deg);
            animation: rotateEnergy 3s linear infinite;
        }
        @keyframes rotateEnergy { 100% { transform: rotate(360deg); } }

        /* ESTADO ACTIVO (.post-hero-active) */
        /* Solo habilitar punteros de los hotspots cuando esté la clase activa */
        body.post-hero-active #hotspot-eyes { pointer-events: auto; cursor: pointer; }
        body.post-hero-active #hotspot-body { pointer-events: auto; cursor: crosshair; }

        /* Activación Hover CSS Visual */
        body.post-hero-active #hotspot-eyes:hover .eye-flare-container { opacity: 1; }
        body.post-hero-active #hotspot-eyes:hover .lens-flare-core { transform: scaleX(1); }
        body.post-hero-active #hotspot-eyes:hover .eye-glow-radial { transform: scale(1.1); }
        body.post-hero-active #hotspot-body:hover ~ .energy-flow-overlay { opacity: 1; }

        /* DEBUG VISUAL */
        #debug-panel { display: none; }
        body.debug-mode #debug-panel { display: block; }
        body.debug-mode #hotspot-eyes { border: 2px dashed #00E5FF; background: rgba(0,229,255,0.1); }
        body.debug-mode #hotspot-body { border: 2px dashed #D4AF37; background: rgba(212,175,55,0.1); }
    </style>
</head>
<body class="text-white selection:bg-viking-gold selection:text-black font-sans">

    <!-- PANEL DE DEBUG (Z-INDEX SUPERIOR, OCULTO POR DEFECTO) -->
    <div id="debug-panel" class="fixed top-4 left-4 z-[9999] bg-black/80 border border-viking-cyan p-4 font-mono text-[10px] text-viking-cyan pointer-events-none rounded">
        <b>DEBUG PANEL</b><br>
        <span id="dbg-phase">Phase: -</span><br>
        <span id="dbg-progress">Progress: -</span><br>
        <span id="dbg-frame">Frame Vid: -</span><br>
        <span id="dbg-hover">Hover state: Wait</span>
    </div>

    <!-- FASE 3: NAVEGACIÓN (Z-50, máximo superior) -->
    <header id="main-nav" class="fixed top-0 left-0 w-full z-50 px-8 py-6 flex justify-between items-center opacity-0 pointer-events-none transition-opacity duration-500">
        <div class="text-viking-champagne">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M12 2v20M4 6l8-4 8 4M4 12l8-4 8 4"/></svg>
        </div>
        <nav class="hidden md:flex space-x-12 text-[10px] tracking-[0.3em] text-gray-400 uppercase font-medium pointer-events-auto">
            <a href="#" class="text-viking-gold border-b border-viking-gold pb-1">Inicio</a>
            <a href="#portfolio" class="hover:text-viking-gold transition-colors">Portfolio</a>
            <a href="#" class="hover:text-viking-gold transition-colors">Servicios</a>
            <a href="#" class="hover:text-viking-gold transition-colors">Sobre Mí</a>
            <a href="#" class="hover:text-viking-gold transition-colors">Contacto</a>
        </nav>
        <div class="w-6 hidden md:block"></div>
    </header>

    <!-- MOTOR DE SCROLL (Altura virtual para timeline) -->
    <div id="scroll-wrapper" class="relative w-full h-[400vh] bg-black">
        <div class="sticky top-0 left-0 w-full h-screen overflow-hidden">
            
            <!-- FASE 1: VIDEO PRINCIPAL (Z-0) -->
            <video id="hero-video" class="absolute inset-0 w-full h-full object-cover z-0" muted playsinline preload="auto" crossorigin="anonymous">
                <source src="https://raw.githubusercontent.com/mgecelewicz/vikingialatam/main/FINAL%20final.mp4?v=20260611-2" type="video/mp4">
            </video>

            <!-- FASE 2: HANDOFF IMAGE (Z-10) Evita pantallas negras -->
            <img id="bridge-image" src="https://raw.githubusercontent.com/mgecelewicz/vikingialatam/main/hero-final-frame.jpeg?v=20260611-2" class="absolute inset-0 w-full h-full object-cover z-10 opacity-0 pointer-events-none" crossorigin="anonymous" />

            <!-- FASE 1: SCROLLDOWN (Z-20) -->
            <div id="scrolldown-indicator" class="absolute bottom-12 left-1/2 -translate-x-1/2 z-20 flex flex-col items-center gap-2 transition-opacity duration-300">
                <svg class="w-5 h-5 text-gray-500 animate-bounce" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M12 4v16m0 0l-4-4m4 4l4-4" stroke-linecap="round" stroke-linejoin="round"/></svg>
                <span class="text-[9px] tracking-[0.4em] uppercase text-gray-500 font-light">Desliza para explorar</span>
            </div>

            <!-- FASE 3: CAPA DE HOTSPOTS (Z-30) Por encima de imágenes, debajo de UI y Nav -->
            <div id="hotspots-layer" class="absolute inset-0 z-30 pointer-events-none">
                
                <!-- Hotspot Cuerpo (Torso) Inicialmente pointer-events: none por CSS -->
                <div id="hotspot-body" class="absolute top-[15%] right-[5%] w-[45%] h-[85%] rounded-[40%] z-30 pointer-events-none"></div>
                
                <!-- Capa Visual Efecto Cuerpo (Asociada por CSS sibling '~' al hotspot) -->
                <div class="energy-flow-overlay absolute top-[15%] right-[5%] w-[45%] h-[85%] z-20">
                    <div class="energy-gradient-sweeper"></div>
                </div>
                
                <!-- Hotspot Ojos -->
                <div id="hotspot-eyes" class="absolute top-[28%] right-[22%] w-[12%] h-[12%] rounded-full z-30 pointer-events-none">
                    <div class="eye-flare-container">
                        <div class="eye-glow-radial"></div>
                        <div class="lens-flare-core"></div>
                    </div>
                </div>

                <!-- Partículas secundarias Canvas -->
                <canvas id="energy-canvas" class="absolute inset-0 w-full h-full pointer-events-none z-10 opacity-0 transition-opacity duration-500"></canvas>
            </div>

            <!-- FASE 3: UI CENTRAL POST-HERO (Z-40) Contenedor pointer-events:none para no tapar hotspots, elementos internos auto -->
            <div id="post-hero-ui" class="absolute inset-0 z-40 flex flex-col justify-center px-8 md:px-24 opacity-0 pointer-events-none items-start transform translate-y-8 transition-transform duration-500">
                <h1 class="text-4xl sm:text-6xl md:text-[5rem] lg:text-[5.5rem] font-bold tracking-[0.25em] uppercase leading-none mb-6 drop-shadow-2xl">
                    <span class="metallic-text">VIKING</span><span class="neon-text-cyan font-extrabold">IA</span><span class="metallic-text">LATAM</span>
                </h1>
                <p class="text-[10px] sm:text-xs md:text-sm tracking-[0.3em] text-gray-300 uppercase max-w-xl leading-relaxed font-light drop-shadow-md">
                    Dirección creativa, contenido visual y motion con IA
                </p>
                <!-- Botón protegido. Tiene pointer-events-auto cuando el padre lo permite -->
                <a href="#portfolio" class="ui-button mt-10 px-8 py-3 rounded-md btn-viking-outline text-[10px] tracking-[0.25em] uppercase flex items-center gap-3 text-viking-champagne group font-medium pointer-events-none">
                    Ver Portfolio
                    <svg class="w-4 h-4 group-hover:translate-x-1 transition-transform duration-300 text-viking-gold" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.8" d="M14 5l7 7m0 0l-7 7m7-7H3"></path></svg>
                </a>
            </div>

        </div>
    </div>

    <!-- FASE 4: PREPARACIÓN PERFIL 3/4 -->
    <div id="portfolio" class="relative w-full min-h-screen bg-[#030303] z-40 flex flex-col items-center justify-center border-t border-zinc-900/50">
        <div class="p-8 border border-zinc-800 bg-zinc-950/50 rounded-lg text-center backdrop-blur-sm">
            <span class="block text-viking-gold font-mono text-xs tracking-widest uppercase mb-2">[ CONTENEDOR FASE 4 ]</span>
            <p class="text-zinc-500 font-mono text-[10px] tracking-widest uppercase">TODO: Insertar viking-profile-3-4.png cuando exista.</p>
        </div>
    </div>

    <script>
        document.addEventListener("DOMContentLoaded", () => {
            // === CONFIGURACIÓN DE PRODUCCIÓN ===
            // Cambiar a true para verificar cajas rojas/cyan y panel de datos.
            const DEBUG = false; 
            if (DEBUG) document.body.classList.add('debug-mode');
            
            // Referencias DOM
            const video = document.getElementById("hero-video");
            const bridgeImg = document.getElementById("bridge-image");
            const scrolldown = document.getElementById("scrolldown-indicator");
            const nav = document.getElementById("main-nav");
            const postHeroUI = document.getElementById("post-hero-ui");
            const uiButton = postHeroUI.querySelector(".ui-button");
            const hotspotBody = document.getElementById("hotspot-body");
            const hotspotEyes = document.getElementById("hotspot-eyes");
            const energyCanvas = document.getElementById("energy-canvas");
            
            // Debug Refs
            const dbgPhase = document.getElementById("dbg-phase");
            const dbgProgress = document.getElementById("dbg-progress");
            const dbgFrame = document.getElementById("dbg-frame");
            const dbgHover = document.getElementById("dbg-hover");

            // Arquitectura Matemática
            let targetScroll = 0;
            let currentScroll = 0;
            const heroEnd = 0.75;
            const handoffEnd = 0.85;
            const postHeroStart = 0.85;
            let videoDuration = 6;
            let currentPhase = "INIT";
            let lastVideoTimeUpdate = -1;

            video.addEventListener("loadedmetadata", () => {
                videoDuration = video.duration && !isNaN(video.duration) ? video.duration : 6;
            });

            // Captura de Scroll Rápida
            window.addEventListener("scroll", () => {
                const wrapper = document.getElementById("scroll-wrapper");
                const maxScroll = wrapper.scrollHeight - window.innerHeight;
                targetScroll = Math.max(0, Math.min(1, (window.scrollY - wrapper.offsetTop) / maxScroll));
            });

            // LERP Engine (Animación Fluida)
            function updateMotor() {
                currentScroll += (targetScroll - currentScroll) * 0.08;
                
                // === FASE 1: HERO ===
                if (currentScroll <= heroEnd) {
                    if(currentPhase !== "HERO") {
                        currentPhase = "HERO";
                        document.body.classList.remove('post-hero-active'); // Desactiva Hovers
                        
                        // Ocultar UI
                        nav.style.opacity = 0;
                        nav.style.pointerEvents = "none";
                        postHeroUI.style.opacity = 0;
                        uiButton.style.pointerEvents = "none";
                        postHeroUI.style.transform = `translateY(30px)`;
                        bridgeImg.style.opacity = 0;
                    }
                    
                    // Throttling del video para máxima fluidez (Evitar sobrecargar CPU)
                    const targetTime = (currentScroll / heroEnd) * (videoDuration - 0.1);
                    if (Math.abs(targetTime - lastVideoTimeUpdate) > 0.04 && video.readyState >= 1) {
                        video.currentTime = targetTime;
                        lastVideoTimeUpdate = targetTime;
                    }
                    
                    scrolldown.style.opacity = Math.max(0, 1 - (currentScroll / 0.1));
                } 
                // === FASE 2: HANDOFF (Congelamiento y Crossfade Anti-Negro) ===
                else if (currentScroll <= handoffEnd) {
                    if(currentPhase !== "HANDOFF") {
                        currentPhase = "HANDOFF";
                        document.body.classList.remove('post-hero-active'); // Hovers inactivos
                        scrolldown.style.opacity = 0;
                        
                        // Congelar estricto
                        if (lastVideoTimeUpdate !== (videoDuration - 0.1) && video.readyState >= 1) {
                            video.currentTime = videoDuration - 0.1;
                            lastVideoTimeUpdate = videoDuration - 0.1;
                        }
                    }
                    
                    // Crossfade Imagen
                    const fadeProgress = (currentScroll - heroEnd) / (handoffEnd - heroEnd);
                    bridgeImg.style.opacity = fadeProgress;
                } 
                // === FASE 3: POST-HERO ===
                else {
                    if(currentPhase !== "POST_HERO") {
                        currentPhase = "POST_HERO";
                        bridgeImg.style.opacity = 1;
                        document.body.classList.add('post-hero-active'); // ¡ACTIVA HOVERS CSS Y JS!
                    }
                    
                    // Aparición Progresiva de Interfaz
                    let uiProgress = (currentScroll - postHeroStart) / (1 - postHeroStart);
                    uiProgress = Math.max(0, Math.min(1, uiProgress * 2));
                    
                    nav.style.opacity = uiProgress;
                    nav.style.pointerEvents = uiProgress > 0.5 ? "auto" : "none";
                    
                    postHeroUI.style.opacity = uiProgress;
                    uiButton.style.pointerEvents = uiProgress > 0.5 ? "auto" : "none";
                    postHeroUI.style.transform = `translateY(${(1 - uiProgress) * 30}px)`;
                }

                // Panel Debug Activo
                if (DEBUG) {
                    dbgPhase.innerText = `Phase: ${currentPhase}`;
                    dbgProgress.innerText = `Progress: ${(currentScroll * 100).toFixed(2)}%`;
                    dbgFrame.innerText = `Frame Vid: ${lastVideoTimeUpdate.toFixed(2)}s`;
                }

                requestAnimationFrame(updateMotor);
            }
            updateMotor(); // Start Engine

            // ===============================================
            // LOGS DE VALIDACIÓN Y MOTOR PARTICULAS (Cuerpo)
            // ===============================================
            const ctx = energyCanvas.getContext("2d");
            let particles = [];
            let isHoveringBody = false;

            function resizeCanvas() {
                energyCanvas.width = window.innerWidth;
                energyCanvas.height = window.innerHeight;
            }
            window.addEventListener("resize", resizeCanvas);
            resizeCanvas();

            for (let i = 0; i < 35; i++) {
                particles.push({
                    x: Math.random() * energyCanvas.width,
                    y: Math.random() * energyCanvas.height,
                    vx: (Math.random() - 0.5) * 0.2,
                    vy: (Math.random() - 1) * 0.5,
                    size: Math.random() * 1.5,
                    alpha: Math.random() * 0.4 + 0.1
                });
            }

            function animateParticles() {
                if (!isHoveringBody || !document.body.classList.contains('post-hero-active')) return;
                ctx.clearRect(0, 0, energyCanvas.width, energyCanvas.height);

                particles.forEach(p => {
                    p.y += p.vy;
                    p.x += p.vx;
                    if (p.y < 0) p.y = energyCanvas.height;
                    if (p.x < 0) p.x = energyCanvas.width;
                    if (p.x > energyCanvas.width) p.x = 0;

                    ctx.beginPath();
                    ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                    ctx.fillStyle = `rgba(212, 175, 55, ${p.alpha})`;
                    ctx.fill();
                });
                requestAnimationFrame(animateParticles);
            }

            // OYENTES DE EVENTOS & LOGS
            hotspotEyes.addEventListener("mouseenter", () => {
                if(!document.body.classList.contains('post-hero-active')) return;
                console.log("eyes hover enter");
                if(DEBUG) dbgHover.innerText = `Hover state: EYES ACTIVE`;
            });
            hotspotEyes.addEventListener("mouseleave", () => {
                if(!document.body.classList.contains('post-hero-active')) return;
                console.log("eyes hover leave");
                if(DEBUG) dbgHover.innerText = `Hover state: Wait`;
            });

            hotspotBody.addEventListener("mouseenter", () => {
                if(!document.body.classList.contains('post-hero-active')) return;
                console.log("body hover enter");
                if(DEBUG) dbgHover.innerText = `Hover state: BODY ACTIVE`;
                isHoveringBody = true;
                energyCanvas.style.opacity = 1;
                animateParticles();
            });
            
            hotspotBody.addEventListener("mouseleave", () => {
                if(!document.body.classList.contains('post-hero-active')) return;
                console.log("body hover leave");
                if(DEBUG) dbgHover.innerText = `Hover state: Wait`;
                isHoveringBody = false;
                energyCanvas.style.opacity = 0;
                setTimeout(() => { ctx.clearRect(0, 0, energyCanvas.width, energyCanvas.height); }, 500);
            });

        });
    </script>
</body>
</html>
