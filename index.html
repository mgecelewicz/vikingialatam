<!DOCTYPE html>
<html lang="es" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VIKINGIA LATAM</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;700;800&display=swap" rel="stylesheet">

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        viking: {
                            gold: '#D4AF37',
                            goldLight: '#F3E5AB',
                            cyan: '#00E5FF',
                            dark: '#030303',
                        }
                    },
                    fontFamily: {
                        sans: ['Montserrat', 'sans-serif'],
                    },
                    letterSpacing: {
                        'widest-xl': '0.3em',
                    }
                }
            }
        }
    </script>

    <style>
        body { background-color: #030303; overflow-x: hidden; margin: 0; padding: 0; }
        
        /* Ocultar barra de scroll para inmersión */
        ::-webkit-scrollbar { width: 0px; background: transparent; }
        
        /* Efecto Neón Cyan para "IA" */
        .neon-text-cyan {
            color: #00E5FF;
            text-shadow: 0 0 10px rgba(0, 229, 255, 0.7), 0 0 20px rgba(0, 229, 255, 0.5);
        }

        /* Botón Premium */
        .btn-gold-outline {
            border: 1px solid rgba(212, 175, 55, 0.5);
            background: rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(4px);
            transition: all 0.3s ease;
        }
        .btn-gold-outline:hover {
            border-color: #D4AF37;
            background: rgba(212, 175, 55, 0.1);
            box-shadow: 0 0 15px rgba(212, 175, 55, 0.2);
        }

        /* Gradiente metálico */
        .metallic-text {
            background: linear-gradient(135deg, #FFFFFF 0%, #E2C799 50%, #B89B6C 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* Destello y destello tipo Lens Flare para los ojos */
        .lens-flare-effect {
            box-shadow: 0 0 15px 4px rgba(0, 229, 255, 0.9), 0 0 30px 10px rgba(0, 229, 255, 0.6);
            filter: blur(1px);
        }

        /* Estilo para el Lens Flare horizontal de los ojos */
        .flare-line {
            background: radial-gradient(circle, rgba(255,255,255,1) 0%, rgba(0,229,255,0.8) 30%, rgba(0,229,255,0) 70%);
            transform: scaleX(0);
            transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .active-flare .flare-line {
            transform: scaleX(1);
        }
    </style>
</head>
<body class="text-white selection:bg-viking-gold selection:text-black font-sans">

    <!-- Contenedor que genera la altura para hacer scroll (4 fases) -->
    <div id="scroll-container" style="height: 400vh;">
        
        <!-- Contenedor fijo a la pantalla (Viewport) -->
        <div class="fixed top-0 left-0 w-full h-screen overflow-hidden bg-black flex items-center justify-center">
            
            <!-- FASE 1: VIDEO HERO (z-0) -->
            <video 
                id="hero-video" 
                class="absolute inset-0 w-full h-full object-cover z-0"
                muted 
                playsinline 
                preload="auto"
                crossorigin="anonymous"
            >
                <source src="https://raw.githubusercontent.com/mgecelewicz/vikingialatam/main/FINAL%20final.mp4?v=20260611-2" type="video/mp4">
            </video>

            <!-- FASE 2: HANDOFF (z-10) Imagen Puente (Mismo frame) -->
            <img 
                id="bridge-image" 
                src="https://raw.githubusercontent.com/mgecelewicz/vikingialatam/main/hero-final-frame.jpeg?v=20260611-2" 
                class="absolute inset-0 w-full h-full object-cover z-10 opacity-0"
                alt="Vikingia Frame Final" 
                crossorigin="anonymous"
            />

            <!-- Gradiente oscuro base para legibilidad -->
            <div class="absolute inset-0 bg-black/40 z-20 pointer-events-none"></div>

            <!-- CAPA DE INTERACCIÓN DEL SUJETO DE ENERGÍA (z-25) -->
            <!-- Solo se activa interactivamente al final de las fases (post-hero-active) -->
            <div id="energy-subject-container" class="absolute bottom-0 right-0 w-full md:w-1/2 h-[80%] md:h-full z-25 pointer-events-none transition-opacity duration-500 opacity-0">
                
                <!-- Lienzo para partículas del cuerpo y shimmer dorado -->
                <canvas id="energy-particles" class="absolute inset-0 w-full h-full pointer-events-none"></canvas>

                <!-- Brillos adicionales para los ojos (Glow & Lens Flare) -->
                <div id="eyes-glow-container" class="absolute pointer-events-none w-full h-full top-0 left-0 transition-opacity duration-300 opacity-0">
                    <!-- Ojo Izquierdo -->
                    <div class="absolute w-2.5 h-2.5 rounded-full bg-white lens-flare-effect" style="top: 31%; left: 47.8%;"></div>
                    <!-- Ojo Derecho -->
                    <div class="absolute w-2.5 h-2.5 rounded-full bg-white lens-flare-effect" style="top: 31%; left: 52.8%;"></div>
                    <!-- Destello horizontal (Lens Flare Line) -->
                    <div class="absolute h-[2px] w-48 flare-line animate-pulse" style="top: 31.1%; left: 39%;"></div>
                </div>

                <!-- Hotspots invisibles pero con tracking de interacción -->
                <!-- Hotspot para los ojos (Preciso sobre el rostro del vikingo de energía) -->
                <div id="hotspot-eyes" class="absolute cursor-crosshair" style="top: 26%; left: 43%; width: 14%; height: 9.5%; z-index: 2;"></div>

                <!-- Hotspot para el cuerpo de energía (Torso y hombros) -->
                <div id="hotspot-body" class="absolute cursor-pointer" style="top: 36%; left: 20%; width: 60%; height: 60%; z-index: 1;"></div>
            </div>

            <!-- FASE 3: UI POST-HERO (z-30) (Navegación, Títulos, Botones) -->
            <!-- Menú de Navegación (Solo visible en Post-Hero - z-50 para garantizar que esté por encima de todo) -->
            <header class="absolute top-0 left-0 w-full px-8 py-6 flex justify-between items-center mix-blend-difference z-50">
                <div class="text-viking-gold">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M12 2v20M4 6l8-4 8 4M4 12l8-4 8 4"/>
                    </svg>
                </div>
                <nav id="nav-links" class="hidden md:flex space-x-10 text-[10px] tracking-widest-xl text-gray-300 uppercase font-medium font-sans">
                    <a href="#" class="text-viking-gold border-b border-viking-gold pb-1 transition-all">Inicio</a>
                    <a href="#portfolio" class="hover:text-viking-gold transition-colors pointer-events-auto">Portfolio</a>
                    <a href="#" class="hover:text-viking-gold transition-colors pointer-events-auto">Servicios</a>
                    <a href="#" class="hover:text-viking-gold transition-colors pointer-events-auto">Sobre Mí</a>
                    <a href="#" class="hover:text-viking-gold transition-colors pointer-events-auto">Contacto</a>
                </nav>
                <div class="w-6 hidden md:block"></div>
            </header>

            <!-- Capa de contenidos de UI -->
            <div id="ui-layer" class="absolute inset-0 z-30 flex flex-col items-center justify-center opacity-0 invisible pointer-events-none">
                
                <div id="ui-content" class="relative z-30 flex flex-col items-center text-center mt-12 w-full max-w-5xl px-4 transform translate-y-10">
                    <!-- Título -->
                    <h1 class="text-5xl sm:text-7xl md:text-[5.5rem] font-bold tracking-widest uppercase mb-6" style="text-shadow: 0 4px 20px rgba(0,0,0,0.8);">
                        <span class="metallic-text">VIKING</span><span class="neon-text-cyan">IA</span><span class="metallic-text">LATAM</span>
                    </h1>
                    
                    <!-- Bajada -->
                    <p class="text-[10px] sm:text-xs md:text-sm tracking-[0.25em] md:tracking-[0.3em] text-gray-300 uppercase max-w-3xl leading-relaxed font-light">
                        Dirección creativa,<br class="md:hidden"> contenido visual y motion con IA
                    </p>

                    <!-- Botón -->
                    <a href="#portfolio" class="pointer-events-auto mt-12 px-8 py-3 rounded-full btn-gold-outline text-xs tracking-widest uppercase flex items-center gap-3 text-viking-goldLight group">
                        Ver portfolio
                        <svg class="w-4 h-4 group-hover:translate-x-1 transition-transform" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 5l7 7m0 0l-7 7m7-7H3"></path>
                        </svg>
                    </a>
                </div>

                <!-- 
                    FASE 4: TODO - SUJETO 3/4
                    El contenedor está listo pero oculto.
                    No descomentar ni asignar imagen hasta tener el asset definitivo 'viking-profile-3-4.png'.
                    Evita parches o saltos a imágenes incorrectas.
                -->
                <div id="viking-profile-container" class="absolute bottom-0 right-0 w-1/2 h-[80%] pointer-events-none hidden z-20">
                    <!-- <img src="assets/viking-profile-3-4.png" class="w-full h-full object-contain object-bottom opacity-0" id="viking-3-4-img" /> -->
                </div>

            </div>

        </div>
    </div>

    <script>
        document.addEventListener("DOMContentLoaded", () => {
            const video = document.getElementById("hero-video");
            const bridgeImg = document.getElementById("bridge-image");
            const uiLayer = document.getElementById("ui-layer");
            const uiContent = document.getElementById("ui-content");
            
            // Elementos de la nueva capa de interacción interactiva
            const energyContainer = document.getElementById("energy-subject-container");
            const eyesGlow = document.getElementById("eyes-glow-container");
            const hotspotEyes = document.getElementById("hotspot-eyes");
            const hotspotBody = document.getElementById("hotspot-body");
            const particlesCanvas = document.getElementById("energy-particles");
            const ctx = particlesCanvas.getContext("2d");

            // Variables de Arquitectura Matemática (LERP)
            let targetScroll = 0;
            let currentScroll = 0;
            let videoDuration = 6; // Valor por defecto hasta que cargue

            // Constantes de las Fases dictadas en la instrucción
            const heroEnd = 0.75;
            const handoffEnd = 0.85;
            const postHeroStart = 0.85;

            // Estados de interacción Hover
            let isHoveringEyes = false;
            let isHoveringBody = false;
            let postHeroActive = false;

            video.addEventListener("loadedmetadata", () => {
                videoDuration = video.duration || 6;
                video.currentTime = 0; // Iniciar en frame 0
            });

            // Función de Interpolación Lineal para fluidez extrema
            function LERP(start, end, factor) {
                return start + (end - start) * factor;
            }

            function updateScroll() {
                // Calcular progreso total del scroll real del documento (0.0 a 1.0)
                const maxScroll = document.documentElement.scrollHeight - window.innerHeight;
                targetScroll = Math.max(0, Math.min(1, window.scrollY / maxScroll));

                // Suavizado LERP (El factor 0.08 define la inercia/fluidez)
                currentScroll = LERP(currentScroll, targetScroll, 0.08);

                // ==========================================
                // FASE 1: HERO (0% a 75%)
                // ==========================================
                if (currentScroll <= heroEnd) {
                    let videoProgress = currentScroll / heroEnd;
                    
                    if (video.readyState >= 2) {
                        video.currentTime = videoProgress * (videoDuration - 0.1);
                    }
                    
                    // Resetear capas de las siguientes fases
                    bridgeImg.style.opacity = "0";
                    uiLayer.style.opacity = "0";
                    uiLayer.style.visibility = "hidden";
                    uiLayer.style.pointerEvents = "none";
                    uiContent.style.transform = `translateY(40px)`;

                    // Desactivar interacciones del sujeto de energía
                    deactivatePostHeroInteractions();
                } 
                // ==========================================
                // FASE 2: HANDOFF (75% a 85%)
                // ==========================================
                else if (currentScroll > heroEnd && currentScroll <= handoffEnd) {
                    if (video.readyState >= 2) {
                        video.currentTime = videoDuration - 0.1;
                    }
                    
                    bridgeImg.style.opacity = "1";
                    uiLayer.style.opacity = "0";
                    uiLayer.style.visibility = "hidden";
                    uiLayer.style.pointerEvents = "none";
                    uiContent.style.transform = `translateY(20px)`;

                    deactivatePostHeroInteractions();
                }
                // ==========================================
                // FASE 3: POST-HERO / IDENTIDAD (85% a 100%)
                // ==========================================
                else if (currentScroll > postHeroStart) {
                    if (video.readyState >= 2) {
                        video.currentTime = videoDuration - 0.1;
                    }
                    bridgeImg.style.opacity = "1";

                    let uiProgress = (currentScroll - postHeroStart) / (1.0 - postHeroStart);
                    
                    uiLayer.style.visibility = "visible";
                    uiLayer.style.opacity = uiProgress;
                    
                    let yOffset = 20 * (1 - uiProgress);
                    uiContent.style.transform = `translateY(${yOffset}px)`;

                    if (uiProgress > 0.5) {
                        uiLayer.style.pointerEvents = "auto";
                    } else {
                        uiLayer.style.pointerEvents = "none";
                    }

                    // Activar interacciones del sujeto de energía cuando ya está estable
                    if (uiProgress > 0.5) {
                        activatePostHeroInteractions();
                    } else {
                        deactivatePostHeroInteractions();
                    }
                }

                // Llamar al próximo frame de renderizado
                requestAnimationFrame(updateScroll);
            }

            // Sistema de Partículas para el Shimmer Dorado del Cuerpo
            const particles = [];
            const maxParticles = 80;

            class Particle {
                constructor(isHovered) {
                    this.reset(true);
                    if (isHovered) {
                        this.y = Math.random() * particlesCanvas.height;
                    }
                }

                reset(fromBottom = false) {
                    // Posicionamos el origen en la silueta aproximada del torso/cuerpo del vikingo
                    this.x = (particlesCanvas.width * 0.2) + (Math.random() * particlesCanvas.width * 0.65);
                    this.y = fromBottom ? (particlesCanvas.height + Math.random() * 20) : (particlesCanvas.height * 0.4 + Math.random() * particlesCanvas.height * 0.6);
                    this.size = 0.5 + Math.random() * 1.5;
                    this.speedY = 0.3 + Math.random() * 0.8;
                    this.speedX = (Math.random() - 0.5) * 0.4;
                    this.alpha = 0.1 + Math.random() * 0.5;
                    this.maxLife = 100 + Math.random() * 100;
                    this.life = this.maxLife;
                    
                    // Gradientes de dorados prémium de Vikingia
                    const goldColors = ['#D4AF37', '#F3E5AB', '#B89B6C', '#FFD700'];
                    this.color = goldColors[Math.floor(Math.random() * goldColors.length)];
                }

                update(isHovered) {
                    // Si el hover sobre el cuerpo está activo, las partículas fluyen con más velocidad y movimiento
                    const mult = isHovered ? 2.5 : 1.0;
                    this.y -= this.speedY * mult;
                    this.x += this.speedX * (isHovered ? 1.8 : 1.0);
                    this.life--;

                    if (this.life <= 0 || this.y < particlesCanvas.height * 0.1) {
                        this.reset(true);
                    }
                }

                draw() {
                    ctx.beginPath();
                    ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                    ctx.fillStyle = this.color;
                    ctx.globalAlpha = (this.life / this.maxLife) * this.alpha;
                    ctx.fill();
                }
            }

            // Inicializar partículas
            function initParticles() {
                resizeCanvas();
                for (let i = 0; i < maxParticles; i++) {
                    particles.push(new Particle(false));
                }
            }

            function resizeCanvas() {
                particlesCanvas.width = energyContainer.clientWidth;
                particlesCanvas.height = energyContainer.clientHeight;
            }

            window.addEventListener('resize', resizeCanvas);

            // Bucle del Canvas de Partículas y Constelaciones Doradas
            function animateParticles() {
                ctx.clearRect(0, 0, particlesCanvas.width, particlesCanvas.height);
                
                // Dibujar e interconectar nodos sutiles al estar en hover (shimmer dinámico)
                if (isHoveringBody) {
                    ctx.strokeStyle = 'rgba(212, 175, 55, 0.08)';
                    ctx.lineWidth = 0.5;
                    for (let i = 0; i < particles.length; i++) {
                        for (let j = i + 1; j < particles.length; j++) {
                            const dist = Math.hypot(particles[i].x - particles[j].x, particles[i].y - particles[j].y);
                            if (dist < 75) {
                                ctx.beginPath();
                                ctx.moveTo(particles[i].x, particles[i].y);
                                ctx.lineTo(particles[j].x, particles[j].y);
                                ctx.stroke();
                            }
                        }
                    }
                }

                // Actualizar cada partícula dorada
                particles.forEach(p => {
                    p.update(isHoveringBody);
                    p.draw();
                });

                requestAnimationFrame(animateParticles);
            }

            // Controladores de activación de interactividad de la Fase 3
            function activatePostHeroInteractions() {
                if (postHeroActive) return; // Evitar re-vinculaciones
                postHeroActive = true;

                // Mostrar el contenedor visual del sujeto
                energyContainer.style.opacity = "1";
                energyContainer.classList.add("post-hero-active");

                // Permitir clics y hovers (activar hotspots de interacción)
                hotspotEyes.style.pointerEvents = "auto";
                hotspotBody.style.pointerEvents = "auto";
            }

            function deactivatePostHeroInteractions() {
                if (!postHeroActive) return;
                postHeroActive = false;

                // Ocultar y remover interacciones para que el menú de arriba y el scroll principal fluyan
                energyContainer.style.opacity = "0";
                energyContainer.classList.remove("post-hero-active");
                
                hotspotEyes.style.pointerEvents = "none";
                hotspotBody.style.pointerEvents = "none";

                // Resetear estados visuales interactivos de los ojos
                isHoveringEyes = false;
                eyesGlow.style.opacity = "0";
                eyesGlow.classList.remove("active-flare");

                // Resetear estado del cuerpo
                isHoveringBody = false;
            }

            // ========================================================
            // EVENTOS DE HOVER: EFECTO 1 - OJOS (LENS FLARE Y GLOW CYAN)
            // ========================================================
            hotspotEyes.addEventListener("mouseenter", () => {
                if (!postHeroActive) return;
                isHoveringEyes = true;
                
                // Mostrar brillo de ojos e iniciar Lens Flare horizontal
                eyesGlow.style.opacity = "1";
                eyesGlow.classList.add("active-flare");
            });

            hotspotEyes.addEventListener("mouseleave", () => {
                isHoveringEyes = false;
                
                // Suavizar transición de salida de ojos
                eyesGlow.style.opacity = "0";
                eyesGlow.classList.remove("active-flare");
            });

            // ========================================================
            // EVENTOS DE HOVER: EFECTO 2 - CUERPO (PARTÍCULAS ACELERADAS)
            // ========================================================
            hotspotBody.addEventListener("mouseenter", () => {
                if (!postHeroActive) return;
                isHoveringBody = true;
            });

            hotspotBody.addEventListener("mouseleave", () => {
                isHoveringBody = false;
            });

            // Arrancar el motor del scroll y partículas simultáneamente de manera robusta
            initParticles();
            animateParticles();
            updateScroll();
        });
    </script>
</body>
</html>
